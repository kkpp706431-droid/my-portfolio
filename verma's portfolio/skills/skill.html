<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Skills & Technologies</title>
 <link rel="stylesheet" href="skill.css">
</head>
<body>

  <div class="container">
    <div class="heading">
      <p>My Skills</p>
      <h1>Skills & Technologies</h1>
      <div class="line"></div>
    </div>

    <div class="skills">
      <div class="card">
        <div class="icon"><img src="icons8-html-5-48.png" alt=""></div>
        <h3>HTML</h3>
        <p>90%</p>
        <div class="progress"><span style="width:90%"></span></div>
      </div>

      <div class="card">
        <div class="icon"><img src="icons8-css-logo-48.png" alt=""></div>
        <h3>CSS</h3>
        <p>85%</p>
        <div class="progress"><span style="width:85%"></span></div>
      </div>

      <div class="card">
        <div class="icon"><img id="js" src="js (1).png" alt=""></div>
        <h3>JavaScript</h3>
        <p>70%</p>
        <div class="progress"><span style="width:70%"></span></div>
      </div>

      <div class="card">
        <div class="icon"><img id="resposive" src="responsive-design.png" alt=""></div>
        <h3>Responsive</h3>
        <p>90%</p>
        <div class="progress"><span style="width:90%"></span></div>
      </div>

      <div class="card">
        <div class="icon"><img id="git" src="github.png" alt=""></div>
        <h3>Git & GitHub</h3>
        <p>learning.!</p>
        <div class=""><span style="width:100%"></span></div>
      </div>
    </div>

    <div class="cta">
      <div>
        <h2>Have a project in mind?</h2>
        <p>Let's work together and build something amazing.</p>
      </div>
      <button>Let's Talk →</button>
    </div>
  </div>
<script src="skill.js"></script>
</body>
</html>
