<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>About Me</title>
  <link rel="stylesheet" href="about.css" />
  <link rel="shortcut icon" href="/id-card.png" type="image/x-icon">
</head>

<body>

  <!-- HEADER -->
  <header>
    <nav id="nav">
      <h1>About Me</h1>
      <div id="who">Who I Am</div>
    </nav>
  </header>

  <!-- MAIN SECTION -->
  <main id="main">

    <!-- IMAGE SECTION -->
    <div id="mypic">
      <img id="mypic2" src="/about/images/Picsart_26-05-14_14-24-06-385.png" alt="Kartik Verma">
    </div>

    <!-- DESCRIPTION SECTION -->
    <div id="description">

      <div id="minides">
        I'm Kartik Verma, a frontend developer based in India.
        
        I have a passion for creating beautiful and functional web experiences.
        
        I love turning ideas into real websites.
      </div>

      <!-- EXPERIENCE SECTION -->
      <section id="exp">
        <div class="stats-container">

          <!-- EXPERIENCE -->
          <div class="stat-box">
            <div class="icon purple">
              <img src="/about/images/icons8-work-experience-48.png" alt="experience">
            </div>
            <div class="text">
              <h3>Experience</h3>
              <p>1+ Years (beginner) </p>
            </div>
          </div>

          <!-- PROJECTS -->
          <div class="stat-box">
            <div class="icon green">
              <img src="/about/images/icons8-project-management-48.png" alt="projects">
            </div>
            <div class="text">
              <h3>Completed Projects</h3>
              <p>3+</p>
            </div>
          </div>

          <!-- CLIENTS -->
          <div class="stat-box">
            <div class="icon yellow">
              <img src="/about/images/icons8-happy-client-50.png" alt="clients">
            </div>
            <div class="text">
              <h3>Happy Clients</h3>
              <p>4+</p>
            </div>
          </div>

          <!-- BUTTON -->
          <button id="morebutton">More About Me ></button>

        </div>
      </section>

    </div>
  </main>
<script src="about.js"></script>
</body>
</html>
