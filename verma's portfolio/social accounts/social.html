<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Social Accounts</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif;}
    body{
      min-height:100vh;
      background:linear-gradient(135deg,#050816,#0b1437);
      display:flex;
      justify-content:center;
      align-items:center;
      padding:20px;
      color:white;
    }

    .container{
      width:100%;
      max-width:1000px;
      padding:40px;
      background:rgba(255,255,255,0.05);
      backdrop-filter:blur(12px);
      border-radius:25px;
      box-shadow:0 10px 30px rgba(0,0,0,0.35);
      animation:fadeUp 1s ease;
    }

    h1{
      text-align:center;
      margin-bottom:12px;
      font-size:42px;
    }

    p{
      text-align:center;
      color:#c6c9dc;
      margin-bottom:40px;
    }

    .social-grid{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
      gap:25px;
    }

    .card{
      background:rgba(255,255,255,0.06);
      border-radius:18px;
      padding:30px 20px;
      text-align:center;
      transition:.35s ease;
      border:1px solid rgba(255,255,255,0.08);
      
    }

    .card:hover{
      transform:translateY(-10px) scale(1.03);
      box-shadow:0 15px 30px rgba(108,76,255,0.25);
    }

    .icon{
      font-size:55px;
      margin-bottom:18px;
    }

    .card h3{
      margin-bottom:8px;
      font-size:22px;
    }
    img
    {
        height: 70px;
        margin-bottom: -10px;
    }

    .card a{
      display:inline-block;
      margin-top:14px;
      padding:12px 22px;
      border-radius:12px;
      text-decoration:none;
      background:#6c4cff;
      color:white;
      transition:.3s;
    }

    .card a:hover{
      background:#5738f5;
    }

    @keyframes fadeUp{
      from{opacity:0;transform:translateY(40px);}
      to{opacity:1;transform:translateY(0);}
    }

    @media(max-width:768px){
      .container{padding:25px;}
      h1{font-size:32px;}
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>My Social Accounts</h1>
    <p>Connect with me on different platforms.</p>

    <div class="social-grid">
      <div class="card">
        <div class="icon"><img src="/contact/instagram.png" alt=""></div>
        <h3>Instagram</h3>
        <a href="https://www.instagram.com/_kartik_verma_02?igsh=MTNzemM5OGZidHZrNg%3D%3D">Follow Me</a>
      </div>

      <div class="card">
        <div class="icon"><img src="/contact/linkedin.png" alt=""></div>
        <h3>LinkedIn</h3>
        <a href="#">Connect</a>
      </div>

      <div class="card">
        <div class="icon"><img src="/skills/github.png" alt=""></div>
        <h3>GitHub</h3>
        <a href="#">View Profile</a>
      </div>

      <div class="card">
        <div class="icon"><img src="/contact/telegram (2).png" alt=""></div>
        <h3>Telegram</h3>
        <a href="#">Message</a>
      </div>
    </div>
  </div>
  <script src="social.js"></script>
</body>
</html>
